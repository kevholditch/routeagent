<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Running Route — {{ location_name }}</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #map { height: 100%; width: 100%; }
    .info-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 14px 18px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      max-width: 260px;
      font-size: 14px;
      line-height: 1.5;
    }
    .info-panel h2 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #333;
    }
    .info-panel .stat {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .info-panel .stat .label { color: #666; }
    .info-panel .stat .value { font-weight: 600; color: #333; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="info-panel">
    <h2>{{ location_name }}</h2>
    <div class="stat">
      <span class="label">Distance</span>
      <span class="value">{{ distance_km }} km</span>
    </div>
    <div class="stat">
      <span class="label">Elevation gain</span>
      <span class="value">{{ elevation_gain_m }} m</span>
    </div>
    <div class="stat">
      <span class="label">Est. duration</span>
      <span class="value">{{ estimated_duration }}</span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const coords = {{ coordinates_json }};
    const startLat = {{ start_lat }};
    const startLon = {{ start_lon }};

    const map = L.map('map');

    L.tileLayer('https://tile.thunderforest.com/outdoors/{z}/{x}/{y}.png?apikey={{ thunderforest_api_key }}', {
      attribution: '&copy; <a href="https://www.thunderforest.com/">Thunderforest</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 22
    }).addTo(map);

    // Draw route polyline
    const routeLine = L.polyline(coords, {
      color: '#2563eb',
      weight: 4,
      opacity: 0.8
    }).addTo(map);

    // Start/finish marker
    L.circleMarker([startLat, startLon], {
      radius: 8,
      fillColor: '#16a34a',
      color: '#fff',
      weight: 2,
      fillOpacity: 1
    }).addTo(map).bindPopup('Start / Finish');

    // Fit map to route bounds
    map.fitBounds(routeLine.getBounds().pad(0.1));
  </script>
</body>
</html>
